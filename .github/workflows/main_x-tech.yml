name: Build and deploy ASP.Net Core app to Azure Web App - x-tech

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

      - name: Restore
        run: dotnet restore INSTITUTO_C/INSTITUTO_C/INSTITUTO_C.csproj

      - name: Build with dotnet
        run: dotnet build INSTITUTO_C/INSTITUTO_C/INSTITUTO_C.csproj --configuration Release --no-restore

      - name: dotnet publish
        run: dotnet publish INSTITUTO_C/INSTITUTO_C.csproj -c Release -o "${{env.DOTNET_ROOT}}/myapp" --no-build

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: .net-app
          path: ${{env.DOTNET_ROOT}}/myapp

  deploy:
    runs-on: windows-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: .net-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_7118AE38CC7E47599B11CBCAEF28CBA8 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_7083D28DCCC74CFDAE463E71EA7019E5 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_ACE9F13D5C6F498DA9E36467A2A5C758 }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'x-tech'
          slot-name: 'Production'
          package: .
